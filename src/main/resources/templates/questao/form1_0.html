<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{template/cabecalho :: head}"></head>
<body id="fundo">
<th:block th:replace="~{template/cabecalho :: nav}"></th:block>

<link
	href='https://fonts.googleapis.com/css?family=Titillium+Web:400,300,600'
	rel='stylesheet' type='text/css'>

<link th:href="@{/resources/form-css/css/normalize.css}" rel="stylesheet">
<link th:href="@{/resources/form-css/css/style.css}" rel="stylesheet">

<div class="form">
	<div class="tab-content">
			<h1>Cadastro de questão dissertativa</h1>
			<form action="criar_questao1D" method="post">

						<input type="hidden"
						class="form-control input-lg" name="id" th:value="${questaoD?.id}"
						readonly="readonly">

						<div class="field-wrap">
          				<select id="select"
						name="area.id" required>
						<option value="" disabled selected>Área da questão</option>
						<option th:each="ar : ${area}"
							th:value="${ar.id}"
							th:selected="${questaoD?.area != null and ar.id == questaoD.area.id}"
							th:text="${ar.nome}">Área</option>
						</select>
						</div>

						<div class="field-wrap">
						<label>Enunciado<span class="req">*</span>
						</label> <textarea id="taForm" name="enunciado"
						required="required"></textarea>
						</div>


						<button type="submit" class="button button-block">Cadastrar!</button>
			</form>
	</div>
</div>

<script
	src='https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>

<script th:src="@{/resources/form-css/js/index.js}"></script>

<th:block th:replace="~{template/rodape :: footer}"></th:block>
</body>
</html>
