<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{template/cabecalho :: head}"></head>
<body id="fundo">
<th:block th:replace="~{template/cabecalho :: nav}"></th:block>

<link
	href='https://fonts.googleapis.com/css?family=Titillium+Web:400,300,600'
	rel='stylesheet' type='text/css'>

<link th:href="@{/resources/form-css/css/normalize.css}" rel="stylesheet">
<link th:href="@{/resources/form-css/css/style.css}" rel="stylesheet">

<style>
.dual-list .list-group {
	margin-top: 8px;
}

.list-left li, .list-right li {
	cursor: pointer;
}

.list-arrows {
	padding-top: 100px;
}

.list-arrows button {
	margin-bottom: 20px;
}
</style>

<div class="form2">
	<div class="row">
		<form action="salvar_prova_aleatoria" method="post">
		<h1>GERAR PROVA AUTOMATICAMENTE</h1>
		<div>
			<h3>Título:</h3>
			<input type="text" name="titulo" th:value="${prova?.titulo}" required="required">
		</div>



			<div>
			<h3>Tempo de prova(em horas):</h3>
			<input type="number" name="tempo" value="1" required="required">
			</div>

		<h3>Áreas:</h3>
		<h4 th:each="area, cont : ${areas}"><input type="checkbox" th:name="'areas[' + ${cont.index} + '].id'" th:value="${area.id}">  <span th:text="${area.nome}"></span></h4>


		<div>
			<h3>Número de questões máximas:</h3>
			<input type="number" name="qtd_ques" value="1" required="required">
		</div>


			<br>
		<button type="submit" class="button button-block">Cadastrar!</button>
		</form>
	</div>

</div>

<script
	src='https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>

<script th:src="@{/resources/form-css/js/index.js}"></script>
<th:block th:replace="~{template/rodape :: footer}"></th:block>
</body>
</html>
