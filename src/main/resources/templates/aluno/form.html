<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{template/cabecalho :: head}"></head>
<body id="fundo">
<th:block th:replace="~{template/cabecalho :: nav}"></th:block>

<div class="row">
	<section class="form col-sm-4 col-sm-offset-4">
		<div class="panel panel-default">
			<div class="panel-heading">
				<h3 class="panel-title" align="center">Cadastre-se</h3>

			</div>
			<div class="panel-body">
				<form action="salvar_aluno" method="post">
					<div class="form-group">
						<input type="hidden"
						class="form-control input-lg" name="aluno.id" th:value="${aluno?.id}"
						readonly="readonly">

						<input type="hidden"
						class="form-control input-lg" name="tipoUsuario" value="2"
						readonly="readonly">

						<label>Nome</label>
						<input type="text" placeholder="Digite seu nome..." class="form-control input-lg" name="nome"
						th:value="${aluno?.nome}" required="required">

						<label>Email</label>
						<input type="email" placeholder="Digite seu e-mail..." class="form-control input-lg" name="email"
						th:value="${aluno?.email}" required="required">

						<label>Telefone</label>

						<script type="text/javascript">
						function mascara(o,f){
							v_obj=o
							v_fun=f
							setTimeout("execmascara()",1)
						}
						function execmascara(){
							v_obj.value=v_fun(v_obj.value)
						}
						function mtel(v){
							v=v.replace(/\D/g,""); //Remove tudo o que não é dígito
							v=v.replace(/^(\d{2})(\d)/g,"($1) $2"); //Coloca parênteses em volta dos dois primeiros dígitos
							v=v.replace(/(\d)(\d{4})$/,"$1-$2"); //Coloca hífen entre o quarto e o quinto dígitos
							return v;
						}
						function id( el ){
							return document.getElementById( el );
						}
						window.onload = function(){
							id('telefone').onkeyup = function(){
								mascara( this, mtel );
							}
						}
						</script>

						<input type="text" maxlength="15" name="telefone" class="form-control input-lg"
						id="telefone" th:value="${aluno?.telefone}" required="required" placeholder="Digite seu telefone..."/>

						<label>Data de Nascimento</label><br>
						<input type="date" class="form-control input-lg" required="required" name="dataNasc"
						th:value="${aluno?.dataNasc != null ? #dates.format(aluno.dataNasc.time, 'yyyy-MM-dd') : ''}">

						<hr>

						<label>Nome de Usuário</label>
						<input type="text" placeholder="Digite um nome de usuário..." class="form-control input-lg" maxlength="15"
						name="login" th:value="${aluno?.login}" required="required">

						<label>Senha</label>
						<input type="password" placeholder="Digite uma senha..." class="form-control input-lg" id="password" maxlength="15"
						name="senha" th:value="${aluno?.senha}" required="required">

						<label>Confirmar Senha</label>
						<input type="password" placeholder="Confirme sua senha..." class="form-control input-lg" id="confirm_password" maxlength="15"
						th:value="${aluno?.senha}" required="required">

						<script type="text/javascript">
							var password = document.getElementById("password"),
							confirm_password = document.getElementById("confirm_password");
							function validatePassword(){
 								if(password.value != confirm_password.value) {
  									confirm_password.setCustomValidity("Senhas diferentes!");
								} else {
					    			confirm_password.setCustomValidity('');
  								}
							}
							password.onchange = validatePassword;
							confirm_password.onkeyup = validatePassword;
						</script>

						<hr>

						<label>Instituição Atual:</label>
						<select class="form-control input-lg" id="select"
							name="instituicao.id">
							<option th:each="inst : ${instituicao}"
								th:value="${inst.id}"
								th:selected="${aluno?.instituicao != null and inst.id == aluno.instituicao.id}"
								th:text="${inst.nome}">Instituição</option>
						</select>

						<label>Formação</label>
						<input type="text" placeholder="Digite sua formação academica..." class="form-control input-lg"
						name="formacao" th:value="${aluno?.formacao}" required="required">

						<label>Área preferida:</label>
						<select class="form-control input-lg" id="select"
							name="area.id">
							<option th:each="ar : ${area}"
								th:value="${ar.id}"
								th:selected="${aluno?.area != null and ar.id == aluno.area.id}"
								th:text="${ar.nome}">Área</option>
						</select>

						<hr>
						<label>O que você cursa atualmente?</label><br>
						<label>
							<input type="checkbox"
							name="ensinoF" th:checked="${aluno?.ensinoF}">Ensino Fundamental
						</label>
						<br>
						<label>
							<input type="checkbox"
							name="ensinoM" th:checked="${aluno?.ensinoM}">Ensino Médio
						</label>
						<br>
						<label>
							<input type="checkbox"
							name="ensinoS" th:checked="${aluno?.ensinoS}">Ensino Superior
						</label>
						<br>
						<label>
							<input type="checkbox"
							name="ensinoT" th:checked="${aluno?.ensinoT}">Ensino Técnico
						</label>

						</div>
					<button type="submit" class="btn btn-default input-lg">Salvar</button>
				</form>
			</div>
		</div>
	</section>
</div>

<th:block th:replace="~{template/rodape :: footer}"></th:block>
</body>
</html>
