<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{template/cabecalho :: head}"></head>
<body id="fundo">
<th:block th:replace="~{template/cabecalho :: nav}"></th:block>

<link
	href='https://fonts.googleapis.com/css?family=Titillium+Web:400,300,600'
	rel='stylesheet' type='text/css'>

<link th:href="@{/resources/form-css/css/normalize.css}" rel="stylesheet">
<link th:href="@{/resources/form-css/css/style.css}" rel="stylesheet">

<style>
.dual-list .list-group {
	margin-top: 8px;
}

.list-left li, .list-right li {
	cursor: pointer;
}

.list-arrows {
	padding-top: 100px;
}

.list-arrows button {
	margin-bottom: 20px;
}
</style>


<div class="form2">
	<div class="row">
		<h1>
			Selecione uma prova ou <a th:href="@{/form_prova1}"><u>crie
					uma você mesmo!</u></a>
		</h1>


		<div class="dual-list list-right col-md-12">
			<div class="well text-left">
				<div class="row">
					<div class="col-md-9">
						<div class="input-group">
							<span class="input-group-addon glyphicon glyphicon-search"></span>
							<input type="text" name="SearchDualList" class="form-control"
								placeholder="search" />
						</div>
					</div>
				</div>
				<ul class="list-group" style="height: 600px; overflow-y: scroll;">
					<h3 style="color: black;">Provas disponíveis</h3>
					<a th:each="p : ${prova}" th:href="@{/prova(id=${p.id})}" style="background-color: white;"
						class="list-group-item">
						<h4 style="color: black;" th:text="${p.titulo}">Título</h4>
						<h5 style="color: black;">
							-
							<th:block th:each="ar : ${p.areas}">- <span th:text="${ar.nome}"></span> -</th:block>
							-
						</h5>
						<h5 style="color: black;">Questões: <span th:text="${p.questoes.size()}"></span></h5>
						<h5 style="color: black;">
							Dificuldade:
							<span th:text="${p.dificuldade == 0 ? 'Fácil' : (p.dificuldade == 1 ? 'Médio' : (p.dificuldade == 2 ? 'Difícil' : 'Indefinido'))}"></span>
						</h5>
					</a>
				</ul>
			</div>
		</div>
	</div>
</div>



<script>
	$(function() {

		var cont = 0;

		$('body').on('click', '.list-group .list-group-item', function() {
			$(this).toggleClass('active');
		});
		$('[name="SearchDualList"]').keyup(function(e) {
			var code = e.keyCode || e.which;
			if (code == '9')
				return;
			if (code == '27')
				$(this).val(null);
			var $rows = $(this).closest('.dual-list').find('.list-group a');
			var val = $.trim($(this).val()).replace(/ +/g, ' ').toLowerCase();
			$rows.show().filter(function() {
				var text = $(this).text().replace(/\s+/g, ' ').toLowerCase();
				return !~text.indexOf(val);
			}).hide();
		});

	});
</script>

<script
	src='https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>

<script th:src="@{/resources/form-css/js/index.js}"></script>
<th:block th:replace="~{template/rodape :: footer}"></th:block>
</body>
</html>
