# Perfil "dev": banco H2 em memoria, para rodar a aplicacao sem instalar PostgreSQL.
# Ative com:  --spring.profiles.active=dev   (ou variavel SPRING_PROFILES_ACTIVE=dev)
spring:
  datasource:
    url: jdbc:h2:mem:utest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: ""

  # Console web do H2 em http://localhost:8080/h2-console
  # (JDBC URL: jdbc:h2:mem:utest  |  user: sa  |  sem senha)
  h2:
    console:
      enabled: true
